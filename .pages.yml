content:
  - name: articles
    label: Articles
    type: collection
    path: src/content/articles
    filename: "{primary}.md"
    view:
      fields: [title, category, date, draft]
    fields:
      - { name: title,       label: Titre,                                  type: string,   required: true }
      - { name: description, label: Résumé (pour le référencement),         type: string }
      - { name: date,        label: Date de publication,                    type: date,     required: true }
      - name: category
        label: Catégorie
        type: select
        default: news
        options:
          values:
            - value: news
              label: "News (accueil)"
            - value: birbizis
              label: Birbizis
            - value: archives
              label: Archives
      - { name: cover,       label: "Image de couverture (URL ImageKit)",   type: string,   description: "Copiez l'URL depuis ImageKit → Media Library → clic sur l'image → panneau de droite" }
      - { name: coverWidth,  label: "Largeur de l'image (px)",              type: number }
      - { name: coverHeight, label: "Hauteur de l'image (px)",              type: number,   description: "Optionnel. Dimensions visibles dans ImageKit → clic sur l'image → panneau Width / Height" }
      - { name: videoUrl,    label: "Vidéo (URL YouTube ou Vimeo)",         type: string,   description: "YouTube: https://youtube.com/watch?v=... ou Vimeo: https://vimeo.com/..." }
      - name: galleryRef
        label: "Galeries associées"
        type: list
        fields:
          - { name: url, label: "URL complète de la galerie", type: string, description: "Collez l'URL depuis la barre d'adresse du site (ex: https://quofai.org/galeries/mon-evenement/)" }
      - { name: draft,       label: Brouillon,                              type: boolean,  default: true }
      - name: body
        label: Contenu
        type: rich-text
        description: "Images: ![](url) dans l'éditeur visuel. 2+ images à la suite = grille automatique. Mode Source: <img src=\"\" alt=\"\">"
        options:
          format: markdown
          switcher: true

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    fields:
      - { name: title,       label: Titre,            type: string,   required: true }
      - { name: description, label: Description SEO,  type: string }
      - name: galleryRef
        label: "Galeries associées"
        type: list
        fields:
          - { name: url, label: "URL complète de la galerie", type: string, description: "Collez l'URL depuis la barre d'adresse du site (ex: https://quofai.org/galeries/mon-evenement/)" }
      - name: body
        label: Contenu
        type: rich-text
        description: "Images: ![](url) dans l'éditeur visuel. 2+ images à la suite = grille automatique. Mode Source: <img src=\"\" alt=\"\">"
        options:
          format: markdown
          switcher: true

  - name: galleries
    label: Galeries
    type: collection
    path: src/content/galleries
    view:
      fields: [title, date, draft]
    fields:
      - { name: title,       label: Nom de la galerie,                        type: string,   required: true }
      - { name: description, label: Description,                              type: string }
      - { name: date,        label: "Date de l'événement",                   type: date,     required: true }
      - { name: cover,       label: "Photo de couverture (URL ImageKit)",     type: string,   required: true, description: "Copiez l'URL depuis ImageKit → Media Library → clic sur l'image → panneau de droite" }
      - { name: coverWidth,  label: "Largeur de la couverture (px)",          type: number }
      - { name: coverHeight, label: "Hauteur de la couverture (px)",          type: number,   description: "Optionnel. Dimensions visibles dans ImageKit → clic sur l'image → panneau Width / Height" }
      - { name: videoUrl,    label: "Vidéo de résumé (URL YouTube ou Vimeo)", type: string,   description: "YouTube: https://youtube.com/watch?v=... ou Vimeo: https://vimeo.com/..." }
      - { name: draft,       label: Brouillon,                                type: boolean,  default: true }
      - name: images
        label: Images
        type: list
        description: "Une URL ImageKit par ligne. alt, largeur et hauteur optionnels"
        fields:
          url:    { label: "URL ImageKit",              type: string, required: true }
          alt:    { label: "Texte alternatif",          type: string }
          width:  { label: "Largeur (px)",              type: number }
          height: { label: "Hauteur (px)",              type: number }
      - name: body
        label: Description détaillée
        type: rich-text
        description: "Images: ![](url) dans l'éditeur visuel. 2+ images à la suite = grille automatique. Mode Source: <img src=\"\" alt=\"\">"
        options:
          format: markdown
          switcher: true
