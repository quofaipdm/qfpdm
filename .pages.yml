content:
  - name: articles
    label: Articles
    type: collection
    path: src/content/articles
    view:
      fields: [title, category, date, draft]
    fields:
      - { name: title,       label: Titre,                                  type: string,   required: true }
      - { name: description, label: Résumé (pour le référencement),         type: string }
      - { name: date,        label: Date de publication,                    type: date,     required: true }
      - name: category
        label: Catégorie
        type: select
        default: news
        options:
          values:
            - value: news
              label: "News (accueil)"
            - value: birbizis
              label: Birbizis
            - value: archives
              label: Archives
      - { name: cover,       label: "Image de couverture (URL ImageKit)",   type: string }
      - { name: coverWidth,  label: "Largeur de l'image (px)",              type: number }
      - { name: coverHeight, label: "Hauteur de l'image (px)",              type: number }
      - { name: videoUrl,    label: "Vidéo (URL YouTube ou Vimeo)",         type: string }
      - { name: galleryRef,  label: "Galerie associée — coller l'URL complète de la galerie (ex: https://qfpdm.pages.dev/galeries/2026-05-12...)", type: string }
      - { name: draft,       label: Brouillon,                              type: boolean,  default: true }
      - { name: body,        label: Contenu,                                type: rich-text }

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    fields:
      - { name: title,       label: Titre,            type: string,   required: true }
      - { name: description, label: Description SEO,  type: string }
      - { name: galleryRef,  label: "Galerie associée", type: string }
      - { name: body,        label: Contenu,           type: rich-text }

  - name: galleries
    label: Galeries
    type: collection
    path: src/content/galleries
    view:
      fields: [title, date, draft]
    fields:
      - { name: title,       label: Nom de la galerie,                        type: string,   required: true }
      - { name: description, label: Description,                              type: string }
      - { name: date,        label: "Date de l'événement",                   type: date,     required: true }
      - { name: cover,       label: "Photo de couverture (URL ImageKit)",     type: string,   required: true }
      - { name: coverWidth,  label: "Largeur de la couverture (px)",          type: number }
      - { name: coverHeight, label: "Hauteur de la couverture (px)",          type: number }
      - { name: videoUrl,    label: "Vidéo de résumé (URL YouTube ou Vimeo)", type: string }
      - { name: draft,       label: Brouillon,                                type: boolean,  default: true }
      - name: images
        label: Images
        type: list
        fields:
          url:    { label: "URL ImageKit",              type: string, required: true }
          alt:    { label: "Texte alternatif",          type: string }
          width:  { label: "Largeur (px)",              type: number }
          height: { label: "Hauteur (px)",              type: number }
      - { name: body,        label: Description détaillée,                   type: rich-text }
